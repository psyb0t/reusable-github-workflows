name: Collaborators Only Workflow

# Caller MUST trigger this with `on: pull_request_target` (not pull_request)
# so the token has permission to comment/close PRs from forks.
# Example caller workflow:
#
#   on:
#     pull_request_target:
#       types: [opened, reopened]
#   jobs:
#     gate:
#       uses: psyb0t/reusable-github-workflows/.github/workflows/collaborators-only-workflow.yml@<sha>

on:
  workflow_call:
    inputs:
      close_message:
        description: "Message to post when closing unauthorized PRs"
        required: false
        default: "This repository does not accept external pull requests. Please open an issue instead."
        type: string
      lock:
        description: "Lock the PR conversation after closing"
        required: false
        default: true
        type: boolean

concurrency:
  group: collaborators-only-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-collaborator:
    name: Check Collaborator
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Close PR if author is not a collaborator
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          CLOSE_MESSAGE: ${{ inputs.close_message }}
          LOCK_PR: ${{ inputs.lock }}
        with:
          script: |
            const author = context.payload.pull_request.user.login;

            try {
              await github.rest.repos.checkCollaborator({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });
              console.log(`${author} is a collaborator — allowing PR`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              console.log(`${author} is not a collaborator — closing PR`);
            }

            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: process.env.CLOSE_MESSAGE,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed',
            });

            if (process.env.LOCK_PR === 'true') {
              await github.rest.issues.lock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
            }
