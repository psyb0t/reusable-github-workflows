name: Collaborators Only Workflow

# Caller MUST trigger this with `on: pull_request_target` (not pull_request)
# so the token has permission to comment/close PRs from forks.
# Example caller workflow:
#
#   on:
#     pull_request_target:
#       types: [opened, reopened]
#   jobs:
#     gate:
#       uses: psyb0t/reusable-github-workflows/.github/workflows/collaborators-only-workflow.yml@<sha>

on:
  workflow_call:
    inputs:
      close_message:
        description: "Message to post when closing unauthorized PRs"
        required: false
        default: "This repository does not accept external pull requests. Please open an issue instead."
        type: string
      lock:
        description: "Lock the PR conversation after closing"
        required: false
        default: true
        type: boolean

concurrency:
  group: collaborators-only-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-collaborator:
    name: Check Collaborator
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Close PR if author is not a collaborator
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          CLOSE_MESSAGE: ${{ inputs.close_message }}
          LOCK_PR: ${{ inputs.lock }}
        run: |
          set -euo pipefail

          # 204 = collaborator, 404 = not collaborator, anything else = bail.
          status=$(gh api -i "repos/${REPO}/collaborators/${AUTHOR}" 2>/dev/null \
            | head -n1 | awk '{print $2}' || true)

          if [ "$status" = "204" ]; then
            echo "${AUTHOR} is a collaborator — allowing PR"
            exit 0
          fi

          if [ "$status" != "404" ]; then
            echo "Unexpected status ${status} from collaborator check" >&2
            exit 1
          fi

          echo "${AUTHOR} is not a collaborator — closing PR"

          gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "${CLOSE_MESSAGE}"
          gh pr close "${PR_NUMBER}" --repo "${REPO}"

          if [ "${LOCK_PR}" = "true" ]; then
            gh pr lock "${PR_NUMBER}" --repo "${REPO}"
          fi
