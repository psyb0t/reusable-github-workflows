name: Python Package Workflow

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version to use"
        required: false
        default: "3.12.0"
        type: string
      install_dependencies_command:
        description: "Command to install dependencies"
        required: false
        default: "make dep"
        type: string
      test_command:
        description: "Command to run tests"
        required: false
        default: ""
        type: string
      build_command:
        description: "Command to build the package"
        required: false
        default: "make build"
        type: string
      dist_dir:
        description: "Dist directory"
        required: false
        default: "dist"
        type: string
      debug:
        description: "Debug workflow"
        required: false
        default: false
        type: boolean
      enable_code_checks:
        description: "Enable code checks"
        required: false
        default: true
        type: boolean
      code_checks:
        description: "Code checks to run (JSON array)"
        required: false
        default: '["bandit", "safety", "pylint", "pyt", "flake8"]'
        type: string
      scan_enabled:
        description: "Enable pip-audit vulnerability scan before publish"
        required: false
        default: true
        type: boolean
      runs_on:
        description: "Runner to use (e.g. ubuntu-latest, self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
    secrets:
      pypi_api_token:
        description: "PyPI token"
        required: true

jobs:
  debug-workflow:
    runs-on: ${{ inputs.runs_on }}
    if: inputs.debug
    steps:
      - name: Debug GitHub context
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.sha: ${{ github.sha }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.run_number: ${{ github.run_number }}"
          echo "github.run_attempt: ${{ github.run_attempt }}"

  setup:
    runs-on: ${{ inputs.runs_on }}
    outputs:
      cache-key: ${{ steps.set_cache_key.outputs.CACHE_KEY }}
    steps:
      - name: Set cache key
        id: set_cache_key
        run: |
          echo "CACHE_KEY=dist-${{ github.run_number }}-${{ github.sha }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT

  code-checks:
    runs-on: ${{ inputs.runs_on }}
    needs: setup
    if: inputs.enable_code_checks
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJson(inputs.code_checks) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ${{ matrix.check }}
          ${{ inputs.install_dependencies_command }}
      - name: Run ${{ matrix.check }}
        run: |
          if [ "${{ matrix.check }}" = "bandit" ]; then
            bandit -r . -ll -f custom --msg-template "{abspath}:{line}: {severity}: {test_id}: {msg}"
          elif [ "${{ matrix.check }}" = "safety" ]; then
            safety check
          elif [ "${{ matrix.check }}" = "pylint" ]; then
            pylint **/*.py
          elif [ "${{ matrix.check }}" = "pyt" ]; then
            pyt -f .
          elif [ "${{ matrix.check }}" = "flake8" ]; then
            flake8 .
          fi

  test:
    runs-on: ${{ inputs.runs_on }}
    needs: [setup, code-checks]
    if: always() && inputs.test_command != '' && needs.setup.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: ${{ inputs.install_dependencies_command }}
      - name: Run tests
        run: ${{ inputs.test_command }}

  build:
    runs-on: ${{ inputs.runs_on }}
    needs: [setup, test, code-checks]
    if: always() && needs.setup.result == 'success' && (inputs.test_command == '' || needs.test.result == 'success') && (!inputs.enable_code_checks || needs.code-checks.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: ${{ inputs.install_dependencies_command }}
      - name: Build
        run: ${{ inputs.build_command }}
      - name: Cache the build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ inputs.dist_dir }}
          key: ${{ needs.setup.outputs.cache-key }}

  security-scan:
    runs-on: ${{ inputs.runs_on }}
    needs: [setup, build]
    if: always() && needs.setup.result == 'success' && needs.build.result == 'success' && inputs.scan_enabled
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: ${{ inputs.install_dependencies_command }}
      - name: Audit dependencies with pip-audit
        run: |
          pip install pip-audit==2.8.0
          pip-audit --strict --progress-spinner=off

  pypi-publish:
    runs-on: ${{ inputs.runs_on }}
    needs: [setup, build, security-scan]
    if: startsWith(github.ref, 'refs/tags/') && always() && needs.setup.result == 'success' && needs.build.result == 'success' && (!inputs.scan_enabled || needs.security-scan.result == 'success')
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Restore build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ inputs.dist_dir }}
          key: ${{ needs.setup.outputs.cache-key }}
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # release/v1.12
        with:
          user: __token__
          password: ${{ secrets.pypi_api_token }}

  release:
    runs-on: ${{ inputs.runs_on }}
    needs: [setup, build, security-scan]
    if: startsWith(github.ref, 'refs/tags/') && always() && needs.setup.result == 'success' && needs.build.result == 'success' && (!inputs.scan_enabled || needs.security-scan.result == 'success')
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Restore build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ inputs.dist_dir }}
          key: ${{ needs.setup.outputs.cache-key }}
      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: false
          files: ${{ inputs.dist_dir }}/*
