name: Python Package Workflow

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version to use"
        required: false
        default: "3.12.0"
        type: string
      install_dependencies_command:
        description: "Command to install dependencies"
        required: false
        default: "make dep"
        type: string
      test_command:
        description: "Command to run tests"
        required: false
        default: ""
        type: string
      build_command:
        description: "Command to build the package"
        required: false
        default: "make build"
        type: string
      dist_dir:
        description: "Dist directory"
        required: false
        default: "dist"
        type: string
      debug:
        description: "Debug workflow"
        required: false
        default: false
        type: boolean
      enable_code_checks:
        description: "Enable code checks"
        required: false
        default: true
        type: boolean
      code_checks:
        description: "Code checks to run (JSON array). Supported: bandit, safety, pylint, flake8. Note: safety's 'check' subcommand is deprecated upstream; opt in only if needed."
        required: false
        default: '["bandit", "pylint", "flake8"]'
        type: string
      scan_enabled:
        description: "Enable pip-audit vulnerability scan before publish"
        required: false
        default: true
        type: boolean
      runs_on:
        description: "Runner to use (e.g. ubuntu-latest, self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      pypi_oidc:
        description: "Use PyPI Trusted Publishing (OIDC) instead of API token. Requires PyPI-side configuration."
        required: false
        default: false
        type: boolean
    secrets:
      pypi_api_token:
        description: "PyPI token (not required when pypi_oidc is true)"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  debug-workflow:
    runs-on: ${{ inputs.runs_on }}
    permissions: {}
    if: inputs.debug
    steps:
      - name: Debug GitHub context
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.sha: ${{ github.sha }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.run_number: ${{ github.run_number }}"
          echo "github.run_attempt: ${{ github.run_attempt }}"

  code-checks:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    if: inputs.enable_code_checks
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJson(inputs.code_checks) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Validate check name
        env:
          CHECK: ${{ matrix.check }}
        run: |
          case "$CHECK" in
            bandit|safety|pylint|flake8) ;;
            *) echo "Unsupported check: $CHECK" >&2; exit 1 ;;
          esac
      - name: Install dependencies
        env:
          CHECK: ${{ matrix.check }}
        run: |
          python -m pip install --upgrade pip
          pip install -- "$CHECK"
          ${{ inputs.install_dependencies_command }}
      - name: Run ${{ matrix.check }}
        env:
          CHECK: ${{ matrix.check }}
        run: |
          if [ "$CHECK" = "bandit" ]; then
            bandit -r . -ll -f custom --msg-template "{abspath}:{line}: {severity}: {test_id}: {msg}"
          elif [ "$CHECK" = "safety" ]; then
            safety check
          elif [ "$CHECK" = "pylint" ]; then
            find . -name '*.py' -not -path './.venv/*' -not -path './venv/*' -print0 | xargs -0 -r pylint
          elif [ "$CHECK" = "flake8" ]; then
            flake8 .
          fi

  test:
    runs-on: ${{ inputs.runs_on }}
    needs: [code-checks]
    permissions:
      contents: read
    if: always() && inputs.test_command != '' && (!inputs.enable_code_checks || needs.code-checks.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: ${{ inputs.install_dependencies_command }}
      - name: Run tests
        run: ${{ inputs.test_command }}

  build:
    runs-on: ${{ inputs.runs_on }}
    needs: [test, code-checks]
    permissions:
      contents: read
    if: always() && (inputs.test_command == '' || needs.test.result == 'success') && (!inputs.enable_code_checks || needs.code-checks.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: ${{ inputs.install_dependencies_command }}
      - name: Build
        run: ${{ inputs.build_command }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: ${{ inputs.dist_dir }}/
          if-no-files-found: error
          retention-days: 7

  security-scan:
    runs-on: ${{ inputs.runs_on }}
    needs: [build]
    permissions:
      contents: read
    if: always() && needs.build.result == 'success' && inputs.scan_enabled
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: ${{ inputs.install_dependencies_command }}
      - name: Audit dependencies with pip-audit
        run: |
          pip install pip-audit==2.8.0
          pip-audit --strict --progress-spinner=off

  pypi-publish:
    runs-on: ${{ inputs.runs_on }}
    needs: [build, security-scan]
    if: startsWith(github.ref, 'refs/tags/') && always() && needs.build.result == 'success' && (!inputs.scan_enabled || needs.security-scan.result == 'success')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: ${{ inputs.dist_dir }}/
      - name: Publish package distributions to PyPI (OIDC)
        if: inputs.pypi_oidc
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # release/v1.12

      - name: Publish package distributions to PyPI (token)
        if: ${{ !inputs.pypi_oidc }}
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # release/v1.12
        with:
          user: __token__
          password: ${{ secrets.pypi_api_token }}

  release:
    runs-on: ${{ inputs.runs_on }}
    needs: [build, security-scan]
    if: startsWith(github.ref, 'refs/tags/') && always() && needs.build.result == 'success' && (!inputs.scan_enabled || needs.security-scan.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: ${{ inputs.dist_dir }}/
      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: false
          files: ${{ inputs.dist_dir }}/*
