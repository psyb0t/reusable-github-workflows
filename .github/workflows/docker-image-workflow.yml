name: Docker Image Workflow

on:
  workflow_call:
    inputs:
      repository_name:
        description: "Docker repository name"
        required: true
        type: string

      target_platforms:
        description: "Target platforms"
        required: true
        type: string
        default: "linux/amd64,linux/arm64"

      build_targets:
        description: 'JSON array of build targets. Each entry: {"tag_suffix": "", "target": "stage_name" (optional), "file": "Dockerfile.foo" (optional), "platforms": "linux/amd64" (optional, overrides input.target_platforms)}. Empty tag_suffix = :latest. Use "target" for multi-stage builds from one Dockerfile, "file" for multi-Dockerfile repos, "platforms" for per-image arch overrides (e.g. CUDA image amd64-only while CPU image stays multi-arch). Examples: [{"target":"full","tag_suffix":""},{"target":"minimal","tag_suffix":"-minimal"}] or [{"file":"Dockerfile","tag_suffix":""},{"file":"Dockerfile.cuda","tag_suffix":"-cuda","platforms":"linux/amd64"}]'
        required: false
        type: string
        default: ""

      scan_severity:
        description: "Grype severity threshold to fail on (negligible, low, medium, high, critical)"
        required: false
        type: string
        default: "medium"

      scan_enabled:
        description: "Enable Grype vulnerability scan (runs after push, failure shows in pipeline)"
        required: false
        type: boolean
        default: true

      cache_mode:
        description: "Buildx cache mode (max caches all layers, min caches final only). Use min for large images that fail to push."
        required: false
        type: string
        default: "max"

      runs_on:
        description: "Runner to use (e.g. ubuntu-latest, self-hosted)"
        required: false
        type: string
        default: "ubuntu-latest"

      attestations:
        description: "Generate SBOM and max-mode provenance attestations on push. Disable if your registry rejects OCI attestation manifests."
        required: false
        type: boolean
        default: true

    secrets:
      dockerhub_username:
        description: "Docker Hub username"
        required: true

      dockerhub_token:
        description: "Docker Hub token"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # ══════════════════════════════════════════════
  # Single image (default, backwards compatible)
  # ══════════════════════════════════════════════

  build:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets == ''
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Push latest
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          tags: ${{ inputs.repository_name }}:latest
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=${{ inputs.cache_mode }},scope=${{ github.ref_name }}
          provenance: ${{ inputs.attestations && 'mode=max' || 'false' }}
          sbom: ${{ inputs.attestations }}

      - name: Push release
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          tags: ${{ inputs.repository_name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=${{ inputs.cache_mode }},scope=${{ github.ref_name }}
          provenance: ${{ inputs.attestations && 'mode=max' || 'false' }}
          sbom: ${{ inputs.attestations }}

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
          repository: ${{ inputs.repository_name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && needs.build.result == 'success'
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1

  scan:
    needs: build
    if: always() && needs.build.result == 'success' && inputs.build_targets == '' && inputs.scan_enabled
    runs-on: ${{ inputs.runs_on }}
    permissions: {}
    steps:
      - name: Scan pushed image with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ inputs.repository_name }}:${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          fail-build: true
          severity-cutoff: ${{ inputs.scan_severity }}
          output-format: table

  # ══════════════════════════════════════════════
  # Multi-target build
  # ══════════════════════════════════════════════

  build-multi:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets != ''
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    strategy:
      matrix:
        include: ${{ fromJson(inputs.build_targets) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Push latest
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          file: ${{ matrix.file || 'Dockerfile' }}
          platforms: ${{ matrix.platforms || inputs.target_platforms }}
          target: ${{ matrix.target || '' }}
          tags: ${{ inputs.repository_name }}:latest${{ matrix.tag_suffix }}
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.target || matrix.tag_suffix }}
          cache-to: type=gha,mode=${{ inputs.cache_mode }},scope=${{ github.ref_name }}-${{ matrix.target || matrix.tag_suffix }}
          provenance: ${{ inputs.attestations && 'mode=max' || 'false' }}
          sbom: ${{ inputs.attestations }}

      - name: Push release
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          file: ${{ matrix.file || 'Dockerfile' }}
          platforms: ${{ matrix.platforms || inputs.target_platforms }}
          target: ${{ matrix.target || '' }}
          tags: ${{ inputs.repository_name }}:${{ github.ref_name }}${{ matrix.tag_suffix }}
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ matrix.target || matrix.tag_suffix }}
          cache-to: type=gha,mode=${{ inputs.cache_mode }},scope=${{ github.ref_name }}-${{ matrix.target || matrix.tag_suffix }}
          provenance: ${{ inputs.attestations && 'mode=max' || 'false' }}
          sbom: ${{ inputs.attestations }}

  release-multi:
    needs: build-multi
    if: startsWith(github.ref, 'refs/tags/') && needs.build-multi.result == 'success'
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1

  scan-multi:
    needs: build-multi
    if: always() && needs.build-multi.result == 'success' && inputs.build_targets != '' && inputs.scan_enabled
    runs-on: ${{ inputs.runs_on }}
    permissions: {}
    strategy:
      matrix:
        include: ${{ fromJson(inputs.build_targets) }}
    steps:
      - name: Scan pushed image with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ inputs.repository_name }}:${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}${{ matrix.tag_suffix }}
          fail-build: true
          severity-cutoff: ${{ inputs.scan_severity }}
          output-format: table

  update-dockerhub-description:
    needs: build-multi
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets != '' && needs.build-multi.result == 'success'
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
          repository: ${{ inputs.repository_name }}
