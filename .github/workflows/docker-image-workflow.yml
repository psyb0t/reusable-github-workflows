name: Docker Image Workflow

on:
  workflow_call:
    inputs:
      repository_name:
        description: "Docker repository name"
        required: true
        type: string

      target_platforms:
        description: "Target platforms"
        required: true
        type: string
        default: "linux/amd64,linux/arm64"

      build_targets:
        description: 'JSON array of build targets. Each entry: {"target": "stage_name", "tag_suffix": ""}. Empty tag_suffix = :latest. Example: [{"target":"full","tag_suffix":""},{"target":"minimal","tag_suffix":"-minimal"}]'
        required: false
        type: string
        default: ""

      scan_severity:
        description: "Grype severity threshold to fail on (negligible, low, medium, high, critical)"
        required: false
        type: string
        default: "critical"

      scan_enabled:
        description: "Enable Grype vulnerability scan"
        required: false
        type: boolean
        default: true

    secrets:
      dockerhub_username:
        description: "Docker Hub username"
        required: true

      dockerhub_token:
        description: "Docker Hub token"
        required: true

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1

  # single image build (default, backwards compatible)
  push-to-dockerhub:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets == ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Create Buildx builder
        run: |
          docker buildx create --use --name mybuilder
          docker buildx inspect mybuilder --bootstrap

      - name: Build and Push (latest)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          tags: ${{ inputs.repository_name }}:latest

      - name: Get Release Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/*/}
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Build and Push New Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          tags: ${{ inputs.repository_name }}:${{env.RELEASE_VERSION}}

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
          repository: ${{ inputs.repository_name }}

  # vulnerability scan (single image)
  scan:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets == '' && inputs.scan_enabled
    needs: push-to-dockerhub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan image with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ inputs.repository_name }}:latest
          fail-build: true
          severity-cutoff: ${{ inputs.scan_severity }}

  # multi-target build (when build_targets is provided)
  push-to-dockerhub-multi:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(inputs.build_targets) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Create Buildx builder
        run: |
          docker buildx create --use --name mybuilder
          docker buildx inspect mybuilder --bootstrap

      - name: Build and Push (latest)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          target: ${{ matrix.target }}
          tags: ${{ inputs.repository_name }}:latest${{ matrix.tag_suffix }}

      - name: Get Release Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/*/}
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Build and Push New Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          target: ${{ matrix.target }}
          tags: ${{ inputs.repository_name }}:${{ env.RELEASE_VERSION }}${{ matrix.tag_suffix }}

  # vulnerability scan (multi-target — scans each target)
  scan-multi:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets != '' && inputs.scan_enabled
    needs: push-to-dockerhub-multi
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(inputs.build_targets) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan image with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ inputs.repository_name }}:latest${{ matrix.tag_suffix }}
          fail-build: true
          severity-cutoff: ${{ inputs.scan_severity }}

  update-dockerhub-description:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets != ''
    needs: push-to-dockerhub-multi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
          repository: ${{ inputs.repository_name }}
