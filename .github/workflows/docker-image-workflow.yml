name: Docker Image Workflow

on:
  workflow_call:
    inputs:
      repository_name:
        description: "Docker repository name"
        required: true
        type: string

      target_platforms:
        description: "Target platforms"
        required: true
        type: string
        default: "linux/amd64,linux/arm64"

      build_targets:
        description: 'JSON array of build targets. Each entry: {"target": "stage_name", "tag_suffix": ""}. Empty tag_suffix = :latest. Example: [{"target":"full","tag_suffix":""},{"target":"minimal","tag_suffix":"-minimal"}]'
        required: false
        type: string
        default: ""

    secrets:
      dockerhub_username:
        description: "Docker Hub username"
        required: true

      dockerhub_token:
        description: "Docker Hub token"
        required: true

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Release
        uses: softprops/action-gh-release@v2

  # single image build (default, backwards compatible)
  push-to-dockerhub:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets == ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Create Buildx builder
        run: |
          docker buildx create --use --name mybuilder
          docker buildx inspect mybuilder --bootstrap

      - name: Build and Push (latest)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          tags: ${{ inputs.repository_name }}:latest

      - name: Get Release Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/*/}
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Build and Push New Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          tags: ${{ inputs.repository_name }}:${{env.RELEASE_VERSION}}

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
          repository: ${{ inputs.repository_name }}

  # multi-target build (when build_targets is provided)
  prepare-matrix:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets != ''
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          echo "matrix=${{ inputs.build_targets }}" >> $GITHUB_OUTPUT

  push-to-dockerhub-multi:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets != ''
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Create Buildx builder
        run: |
          docker buildx create --use --name mybuilder
          docker buildx inspect mybuilder --bootstrap

      - name: Build and Push (latest)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          target: ${{ matrix.target }}
          tags: ${{ inputs.repository_name }}:latest${{ matrix.tag_suffix }}

      - name: Get Release Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/*/}
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Build and Push New Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ inputs.target_platforms }}
          target: ${{ matrix.target }}
          tags: ${{ inputs.repository_name }}:${{ env.RELEASE_VERSION }}${{ matrix.tag_suffix }}

  update-dockerhub-description:
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.build_targets != ''
    needs: push-to-dockerhub-multi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
          repository: ${{ inputs.repository_name }}
