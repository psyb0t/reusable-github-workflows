name: Go Workflow

# SECURITY: `test_command`, `lint_command`, `dep_command` are interpolated
# directly into shell scripts. Callers control these strings and effectively
# get arbitrary code execution on the runner with whatever secrets/permissions
# the caller workflow grants. Only call this workflow from trusted repos with
# branch protection on the workflow files.

on:
  workflow_call:
    inputs:
      go_version:
        description: "Go version to use"
        required: false
        default: "1.26"
        type: string
      test_command:
        description: "Command to run tests"
        required: false
        default: "make test"
        type: string
      lint_command:
        description: "Command to run linting"
        required: false
        default: "make lint"
        type: string
      dep_command:
        description: "Command to download dependencies"
        required: false
        default: "make dep"
        type: string
      is_vendored:
        description: "Whether dependencies are vendored (skips dep_command)"
        required: false
        default: false
        type: boolean
      scan_enabled:
        description: "Enable govulncheck dependency vulnerability scan"
        required: false
        default: true
        type: boolean
      runs_on:
        description: "Runner to use (e.g. ubuntu-latest, self-hosted)"
        required: false
        default: "ubuntu-latest"
        type: string
      debug:
        description: "Debug workflow"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  debug-workflow:
    name: Debug Info
    runs-on: ${{ inputs.runs_on }}
    permissions: {}
    if: inputs.debug
    steps:
      - name: Debug GitHub context
        run: |
          echo "::group::GitHub Context"
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.sha: ${{ github.sha }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.run_number: ${{ github.run_number }}"
          echo "github.run_attempt: ${{ github.run_attempt }}"
          echo "github.actor: ${{ github.actor }}"
          echo "github.repository: ${{ github.repository }}"
          echo "::endgroup::"

          echo "::group::Inputs"
          echo "go_version: ${{ inputs.go_version }}"
          echo "test_command: ${{ inputs.test_command }}"
          echo "lint_command: ${{ inputs.lint_command }}"
          echo "dep_command: ${{ inputs.dep_command }}"
          echo "is_vendored: ${{ inputs.is_vendored }}"
          echo "::endgroup::"

  code-checks:
    name: Code Checks
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    if: inputs.lint_command != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Setup dependencies
        if: ${{ !inputs.is_vendored }}
        run: ${{ inputs.dep_command }}

      - name: Run code checks
        run: ${{ inputs.lint_command }}

  test:
    name: Test
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    if: inputs.test_command != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Setup dependencies
        if: ${{ !inputs.is_vendored }}
        run: ${{ inputs.dep_command }}

      - name: Run tests
        run: |
          echo "Running: ${{ inputs.test_command }}"
          ${{ inputs.test_command }}

  security-scan:
    name: Security Scan
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
    if: inputs.scan_enabled
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Setup dependencies
        if: ${{ !inputs.is_vendored }}
        run: ${{ inputs.dep_command }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

  release:
    name: GitHub Release
    runs-on: ${{ inputs.runs_on }}
    needs: [code-checks, test, security-scan]
    if: always() && contains(github.ref, 'refs/tags/') && (needs.test.result == 'success' || needs.test.result == 'skipped') && (needs.code-checks.result == 'success' || needs.code-checks.result == 'skipped') && (!inputs.scan_enabled || needs.security-scan.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Generate changelog and classify release
        id: changelog
        run: |
          tag_name=${GITHUB_REF#refs/tags/}
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

          if echo "$tag_name" | grep -qiE '(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          if git describe --tags --abbrev=0 HEAD^ >/dev/null 2>&1; then
            prev_tag=$(git describe --tags --abbrev=0 HEAD^)
            echo "## Changes in ${tag_name}" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"* %s (%h)" "${prev_tag}..HEAD" >> CHANGELOG.md
          else
            echo "## Initial Release ${tag_name}" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "First release of this project." >> CHANGELOG.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.changelog.outputs.tag_name }}
          name: Release ${{ steps.changelog.outputs.tag_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ steps.changelog.outputs.is_prerelease == 'true' }}
          files: ""
          generate_release_notes: true
          make_latest: ${{ steps.changelog.outputs.is_prerelease != 'true' }}
